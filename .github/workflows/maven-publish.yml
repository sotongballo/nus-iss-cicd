name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

  snyk-security-scanning:
    runs-on: ubuntu-latest
    needs: build  # Runs only after the build job succeeds

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ── 1. SAST & SCA — scan source code + Maven dependencies ──────────────
    - name: Snyk — Test open-source dependencies (SCA)
      uses: snyk/actions/maven@master
      continue-on-error: true          # upload results even if vulnerabilities found
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high --sarif-file-output=snyk-sca.sarif

    # ── 2. Build Docker image for container scanning ────────────────────────
    - name: Build Docker image
      run: docker build -t my-java-app:${{ github.sha }} .

    # ── 3. Container scan — scan the built image for OS + binary CVEs ───────
    - name: Snyk — Test Docker image (Container Scan)
      uses: snyk/actions/docker@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        image: my-java-app:${{ github.sha }}
        args: --severity-threshold=high --sarif-file-output=snyk-container.sarif

    # ── 4. Upload both SARIF reports to GitHub Security tab ─────────────────
    - name: Upload SCA SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: snyk-sca.sarif
        category: snyk-sca

    - name: Upload Container SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: snyk-container.sarif
        category: snyk-container